<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИС ИКД | Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="login-header">
            <h2>ИС ИКД</h2>
            <p>Информационная система поддержки проектов по разработки инженерно-конструкторской документации</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="loginInput" placeholder="Введите логин" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="passInput" placeholder="Введите пароль" autocomplete="current-password" required>
            </div>

            <div id="loginError" style="color:#dc2626;font-size:13px;margin-bottom:12px;display:none;"></div>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">Войти</button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (Auth.getCurrentUser() && API.getToken()) {
            window.location.href = 'dashboard.html';
        }

        var loginInput = document.getElementById('loginInput');
        var passInput = document.getElementById('passInput');
        var errorDiv = document.getElementById('loginError');

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn = document.querySelector('#loginForm button[type="submit"]');
            btn.disabled = true;
            errorDiv.style.display = 'none';

            Auth.login(loginInput.value.trim(), passInput.value).then(function(result) {
                btn.disabled = false;
                if (result.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
