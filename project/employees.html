<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сотрудники | ИС ИКД</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand"><h1>ИС ИКД</h1><span>Industrial Systems</span></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">Панель управления</a>
                <a href="projects.html">Проекты</a>
                <a href="tasks.html">Задачи</a>
                <a href="reports.html">Отчеты</a>
                <a href="employees.html" id="employeesNav">Сотрудники</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-new-project" id="newProjectBtn" onclick="window.location.href='create-project.html'">+ Новый проект</button>
                <button class="btn-logout" onclick="UI.logout()">🚪 Выйти</button>
            </div>
        </aside>

        <header class="header">
            <h2>Реестр сотрудников</h2>
            <div class="header-right">
                <span id="userInfo"></span>
                <button class="btn btn-sm btn-secondary" onclick="UI.logout()">Выйти</button>
            </div>
        </header>

        <main class="main">
            <div class="main-content">
                <div id="notification"></div>

                <div class="card" style="max-width:640px;margin-bottom:24px;">
                    <h2 class="card-header">Регистрация сотрудника</h2>
                    <form id="employeeForm">
                        <div class="form-group"><label>Логин *</label><input type="text" id="empLogin" required></div>
                        <div class="form-group"><label>Пароль *</label><input type="password" id="empPassword" required></div>
                        <div class="form-group"><label>ФИО *</label><input type="text" id="empFullName" required></div>
                        <div class="form-group">
                            <label>Роль *</label>
                            <select id="empRole" required>
                                <option value="">Выберите роль...</option>
                            </select>
                        </div>
                        <div class="form-group" id="deptGroup" style="display:none;">
                            <label>Производственный отдел *</label>
                            <select id="empDepartment">
                                <option value="">Выберите отдел...</option>
                            </select>
                            <small style="color:#888;font-size:12px;">Обязательно для инженеров-проектировщиков</small>
                        </div>
                        <button type="submit" class="btn btn-primary">Зарегистрировать</button>
                    </form>
                </div>

                <div class="card">
                    <h2 class="card-header">Все сотрудники</h2>
                    <table>
                        <thead>
                            <tr><th>Логин</th><th>ФИО</th><th>Роль</th><th>Отдел</th></tr>
                        </thead>
                        <tbody id="employeesTable"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        UI.init('employees.html');

        if (!Auth.checkAccessByCode(['chief_engineer', 'tech_dept_head'])) {
            window.location.href = 'dashboard.html';
        }

        var roleSelect = document.getElementById('empRole');
        var deptGroup = document.getElementById('deptGroup');
        var deptSelect = document.getElementById('empDepartment');

        Promise.all([API.getRoles(), API.getDepartments()]).then(function(results) {
            var roles = results[0];
            var departments = results[1];

            roleSelect.innerHTML = '<option value="">Выберите роль...</option>' +
                roles.map(function(r) {
                    return '<option value="' + r.code + '">' + r.name + '</option>';
                }).join('');

            deptSelect.innerHTML = '<option value="">Выберите отдел...</option>' +
                departments.map(function(d) {
                    return '<option value="' + d.id + '">' + d.name + '</option>';
                }).join('');
        });

        roleSelect.addEventListener('change', function() {
            deptGroup.style.display = this.value === 'designer' ? 'block' : 'none';
        });

        function loadEmployees() {
            API.getEmployees().then(function(list) {
                document.getElementById('employeesTable').innerHTML = list.map(function(e) {
                    return '<tr><td class="text-mono">' + e.login + '</td><td>' + e.fullName + '</td><td>' + e.roleName + '</td><td>' + (e.departmentName || '—') + '</td></tr>';
                }).join('');
            });
        }

        loadEmployees();

        document.getElementById('employeeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var roleCode = roleSelect.value;
            var payload = {
                login: document.getElementById('empLogin').value.trim(),
                password: document.getElementById('empPassword').value,
                fullName: document.getElementById('empFullName').value.trim(),
                roleCode: roleCode
            };
            if (roleCode === 'designer') {
                payload.departmentId = Number(deptSelect.value);
            }

            API.registerEmployee(payload).then(function() {
                UI.showNotification('Сотрудник зарегистрирован');
                document.getElementById('employeeForm').reset();
                deptGroup.style.display = 'none';
                loadEmployees();
            }).catch(function(err) {
                UI.showError(err.message);
            });
        });
    </script>
</body>
</html>
